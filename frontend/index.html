<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G&G (Goal Getter)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-overlay"></div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>G&G</h2>
            <button class="sidebar-close" id="sidebarClose">✕</button>
        </div>
        <ul class="sidebar-nav">
            <li><a href="index.html" class="active"><span class="nav-icon">🏠</span> Home</a></li>
            <li><a href="food_analysis.html"><span class="nav-icon">🍽️</span> Food Analysis</a></li>
        </ul>
    </nav>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="container fade-in has-sidebar">
        <!-- Hamburger button -->
        <button class="sidebar-toggle" id="sidebarToggle">☰</button>

        <header>
            <h1 class="main-heading">G&G (Goal Getter)</h1>
            <p class="subheading">Welcome to G&G! Here you can freely personalize your diet and workout plan.</p>
        </header>

        <main>
            <div class="card form-card">
                <h2 class="section-title">Enter Your Details</h2>
                <form id="detailsForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="age">Age</label>
                            <input type="number" id="age" name="age" min="10" max="100" required placeholder="e.g., 25">
                        </div>
                        <div class="form-group">
                            <label for="height">Height (cm)</label>
                            <input type="number" id="height" name="height" min="50" max="250" required
                                placeholder="e.g., 175">
                        </div>
                        <div class="form-group">
                            <label for="weight">Weight (kg)</label>
                            <input type="number" id="weight" name="weight" min="20" max="300" required
                                placeholder="e.g., 70">
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select id="gender" name="gender" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="foodType">Preferred Food Type</label>
                            <select id="foodType" name="foodType" required>
                                <option value="" disabled selected>Select Preference</option>
                                <option value="Veg">Vegetarian</option>
                                <option value="Non-Veg">Non-Vegetarian</option>
                                <option value="Vegan">Vegan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="activityLevel">Activity Level</label>
                            <select id="activityLevel" name="activityLevel" required>
                                <option value="" disabled selected>Select Activity</option>
                                <option value="sedentary">Sedentary (Little/No Exercise)</option>
                                <option value="lightly_active">Lightly Active (1-3 days/week)</option>
                                <option value="moderately_active">Moderately Active (3-5 days/week)</option>
                                <option value="very_active">Very Active (6-7 days/week)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="health_condition">Health Condition / Issues</label>
                            <textarea id="health_condition" name="health_condition" rows="2"
                                placeholder="e.g., None, Diabetes, PCOD, Joint Pain..." required></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label for="goal">Workout Goal / Preference</label>
                            <textarea id="goal" name="goal" rows="3" required
                                placeholder="e.g., I want to gain muscle and improve stamina..."></textarea>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Get Your Recommendations</button>
                </form>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
